name: Deploy Medical Chatbot to AWS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Login to ECR
        run: |
          aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin 057654278064.dkr.ecr.us-east-1.amazonaws.com

      - name: Build and push Docker image
        run: |
          docker build -t medical-chatbot ./
          docker tag medical-chatbot:latest 057654278064.dkr.ecr.us-east-1.amazonaws.com/medical-chatbot:latest
          docker push 057654278064.dkr.ecr.us-east-1.amazonaws.com/medical-chatbot:latest

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v0.1.5
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker pull 057654278064.dkr.ecr.us-east-1.amazonaws.com/medical-chatbot:latest
            docker stop medical-chatbot || true
            docker rm medical-chatbot || true
            docker run -d -p 8080:8080 --name medical-chatbot 057654278064.dkr.ecr.us-east-1.amazonaws.com/medical-chatbot:latest
