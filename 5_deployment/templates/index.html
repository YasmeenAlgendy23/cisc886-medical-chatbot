<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Medical Chatbot</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: sans-serif; background: #f5f5f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
.chat-container { display: flex; flex-direction: column; height: 600px; width: 100%; max-width: 700px; background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 2px 20px rgba(0,0,0,0.1); }
.chat-header { padding: 16px 20px; border-bottom: 1px solid #eee; background: #f9f9f9; display: flex; align-items: center; gap: 12px; }
.header-icon { width: 36px; height: 36px; border-radius: 50%; background: #E1F5EE; display: flex; align-items: center; justify-content: center; font-size: 18px; }
.header-text h2 { font-size: 15px; font-weight: 600; }
.header-text p { font-size: 12px; color: #888; }
.status-dot { width: 8px; height: 8px; background: #1D9E75; border-radius: 50%; margin-left: auto; }
.messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 16px; }
.message { display: flex; gap: 10px; max-width: 85%; }
.message.user { align-self: flex-end; flex-direction: row-reverse; }
.bubble { padding: 10px 14px; border-radius: 16px; font-size: 14px; line-height: 1.5; }
.message.bot .bubble { background: #f0f0f0; border-radius: 4px 16px 16px 16px; }
.message.user .bubble { background: #1D9E75; color: white; border-radius: 16px 4px 16px 16px; }
.typing span { display: inline-block; width: 7px; height: 7px; background: #999; border-radius: 50%; margin: 0 2px; animation: bounce 1.2s infinite; }
.typing span:nth-child(2) { animation-delay: 0.2s; }
.typing span:nth-child(3) { animation-delay: 0.4s; }
@keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-6px)} }
.input-area { padding: 16px; border-top: 1px solid #eee; display: flex; gap: 10px; }
.input-area input { flex: 1; padding: 10px 14px; border: 1px solid #ddd; border-radius: 20px; font-size: 14px; outline: none; }
.input-area input:focus { border-color: #1D9E75; }
.send-btn { width: 38px; height: 38px; border-radius: 50%; background: #1D9E75; border: none; cursor: pointer; color: white; font-size: 18px; }
.send-btn:hover { background: #0F6E56; }
.disclaimer { font-size: 11px; color: #aaa; text-align: center; padding: 0 16px 10px; }
</style>
</head>
<body>
<div class="chat-container">
  <div class="chat-header">
    <div class="header-icon">&#10084;</div>
    <div class="header-text">
      <h2>Medical Assistant</h2>
      <p>Powered by TinyLlama</p>
    </div>
    <div class="status-dot"></div>
  </div>
  <div class="messages" id="messages">
    <div class="message bot"><div class="bubble">Hello! I am your medical assistant. Ask me any health question. Always consult a licensed doctor for personal advice.</div></div>
  </div>
  <p class="disclaimer">For informational purposes only. Always consult a healthcare professional.</p>
  <div class="input-area">
    <input type="text" id="user-input" placeholder="Ask a medical question..." />
    <button class="send-btn" onclick="sendMessage()">&#10148;</button>
  </div>
</div>
<script>
async function sendMessage() {
  const input = document.getElementById('user-input');
  const msg = input.value.trim();
  if (!msg) return;
  appendMessage('user', msg);
  input.value = '';
  const typing = appendTyping();
  try {
    const res = await fetch('/chat', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:msg})});
    const data = await res.json();
    typing.remove();
    appendMessage('bot', data.response || 'No response.');
  } catch(e) {
    typing.remove();
    appendMessage('bot', 'Error connecting to server.');
  }
}
function appendMessage(role, text) {
  const messages = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = `message ${role}`;
  div.innerHTML = `<div class="bubble">${text}</div>`;
  messages.appendChild(div);
  messages.scrollTop = messages.scrollHeight;
}
function appendTyping() {
  const messages = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'message bot';
  div.innerHTML = `<div class="bubble"><div class="typing"><span></span><span></span><span></span></div></div>`;
  messages.appendChild(div);
  messages.scrollTop = messages.scrollHeight;
  return div;
}
document.getElementById('user-input').addEventListener('keypress', e => { if(e.key==='Enter') sendMessage(); });
</script>
</body>
</html>
